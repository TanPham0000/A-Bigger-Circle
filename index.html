<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>A BIGGER CIRCLE</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/carousel.css"/>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.ico">
</head>
<body>
  <header>
    <h1 id="page-title" class="visually-hidden">A Bigger Circle</h1>
  </header>

  <main class="container">
    <!-- Left Section -->
    <section class="left">
      <div class="inner-container">
        <div class="left-text parallax" data-depth="0.8">
          <img src="assets/logo.svg" alt="A Bigger Circle Logo" class="logo"/>
          <p>WE'RE MAKING</p>
          <p>CONVERSATION</p>
          <p class="regular">Stay tuned for more</p>
        </div>
      </div>
    </section>

    <!-- Right Section -->
    <section class="right">
      <div class="carousel" aria-label="Media Carousel">
        <div class="track">
          
          <figure class="slide">
            <video src="assets/video/video.mp4" autoplay loop muted playsinline></video>
            <figcaption>Sample video caption</figcaption>
          </figure>

          <figure class="slide">
            <img src="assets/carousel/slide1.jpg" alt="Sample image 1">
            <figcaption>Image 1 caption</figcaption>
          </figure>

          <figure class="slide">
            <img src="assets/carousel/slide2.jpg" alt="Sample image 2">
            <figcaption>Image 2 caption</figcaption>
          </figure>

          <figure class="slide">
            <img src="assets/carousel/slide2.jpg" alt="Sample image 2">
            <figcaption>Image 3 caption</figcaption>
          </figure>

          <figure class="slide">
            <img src="assets/carousel/slide2.jpg" alt="Sample image 2">
            <figcaption>Image 3 caption</figcaption>
          </figure>
        </div>

        <nav class="buttons">
          <button type="button" aria-label="Previous" onclick="prev()">‹</button>
          <button type="button" aria-label="Next" onclick="next()">›</button>
        </nav>
      </div>
    </section>
  </main>

  <!-- Scripts -->
  <script src="js/carousel.js"></script>
  <script src="js/parallax.js"></script>
  <script src="js/parallax-gyro.js"></script>

</body>
</html>
